name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify locked dependency graph
        run: cargo metadata --locked --format-version 1 > /dev/null
      - name: Audit advisories, licenses, sources, and dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features
          rust-version: "1.96.1"

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features --locked
      - name: Node smoke
        run: node scripts/smoke-test.js
      - name: Packed npm install smoke on minimum Node
        if: runner.os == 'Linux'
        run: npm run packed-smoke
      - name: E2E
        run: node scripts/e2e-test.js
      - name: Release check
        if: runner.os == 'Linux'
        run: node scripts/release-check.js
      - name: Security check
        if: runner.os == 'Linux'
        run: node scripts/security-check.js
