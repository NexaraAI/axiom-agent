name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: axiom-x86_64-pc-windows-msvc.exe
            binary: axiom.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: axiom-x86_64-unknown-linux-gnu
            binary: axiom
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: axiom-x86_64-apple-darwin
            binary: axiom
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: axiom-aarch64-apple-darwin
            binary: axiom
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build -p axiom-cli --release --target ${{ matrix.target }}
      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten assets and generate checksums
        run: |
          mkdir -p release
          find dist -maxdepth 2 -type f -print -exec cp {} release/ \;
          cd release
          sha256sum axiom-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/axiom-*
            release/SHA256SUMS
