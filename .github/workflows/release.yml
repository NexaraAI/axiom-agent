name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Verify tag and changelog version
        shell: bash
        run: |
          npm run check-version-sync
          package_version="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v${package_version}"
          grep -Fx "## ${package_version}" CHANGELOG.md
      - name: Verify locked dependency graph
        run: cargo metadata --locked --format-version 1 > /dev/null
      - name: Verify formatting
        run: cargo fmt --all -- --check
      - name: Lint full workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test full workspace
        run: cargo test --workspace --all-features --locked
      - name: Audit advisories, licenses, sources, and dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features
          rust-version: "1.96.1"
      - name: Run Node release gates
        run: |
          node scripts/smoke-test.js
          node scripts/e2e-test.js
          node scripts/release-check.js
          node scripts/security-check.js
          node scripts/check-dist-tag.js --self-test
          node scripts/check-publish-readiness.js --self-test
          npm run packed-smoke
      - name: Verify npm package contents
        run: npm pack --dry-run

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: axiom-x86_64-pc-windows-msvc.exe
            binary: axiom.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: axiom-x86_64-unknown-linux-gnu
            binary: axiom
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: axiom-x86_64-apple-darwin
            binary: axiom
          - os: macos-15
            target: aarch64-apple-darwin
            asset: axiom-aarch64-apple-darwin
            binary: axiom
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - name: Build release binary
        run: cargo build -p axiom-cli --release --locked --target ${{ matrix.target }}
      - name: Smoke native release binary
        env:
          AXIOM_E2E_BINARY: ${{ github.workspace }}/target/${{ matrix.target }}/release/${{ matrix.binary }}
        run: node scripts/e2e-test.js
      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
      - name: Flatten binary assets
        run: |
          mkdir -p release
          find dist -maxdepth 2 -type f -print -exec cp {} release/ \;
      - name: Generate SPDX JSON SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: release/axiom-agent.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate release checksums
        run: |
          cd release
          sha256sum axiom-* > SHA256SUMS
          grep -v 'axiom-agent.spdx.json' SHA256SUMS > ../BINARY_SHA256SUMS
      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release/*
      - name: Attest binary SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: BINARY_SHA256SUMS
          sbom-path: release/axiom-agent.spdx.json
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          body_path: docs/RELEASE_NOTES.md
          files: |
            release/axiom-*
            release/SHA256SUMS
