name: npm Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm instead of doing a dry run"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  release:
    types: [published]

jobs:
  smoke:
    name: npm smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run smoke tests
        run: npm run smoke
      - name: Check package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Run smoke tests
        run: npm run smoke
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
