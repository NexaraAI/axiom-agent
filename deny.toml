[graph]
all-features = true
targets = [
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = []

[licenses]
confidence-threshold = 0.93
include-dev = true
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
  { crate = "openssl", reason = "Axiom standardizes on rustls for TLS" },
  { crate = "openssl-sys", reason = "Axiom standardizes on rustls for TLS" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
